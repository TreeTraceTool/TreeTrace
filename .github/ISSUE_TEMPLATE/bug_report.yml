name: Bug report
description: Something in TreeTrace did not work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do not paste real secrets or full transcripts. A redacted snippet is enough.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you ran and what TreeTrace did.
      placeholder: I ran `npx treetrace --report` and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TreeTrace version
      placeholder: 0.4.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS and Node version
      placeholder: macOS 14, Node 20
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Transcript source
      options:
        - Claude Code (auto-discovered)
        - Codex CLI
        - ChatGPT export
        - Gemini CLI
        - Copilot
        - Cursor
        - Grok
        - Pasted transcript
        - Other
    validations:
      required: false
